name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/namba-search
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .[dev,fetch]
      - run: ruff check .
      - run: python -m pytest tests/unit tests/integration tests/security tests/mcp_contract tests/plugin_e2e
      - run: python scripts/validate_release.py
